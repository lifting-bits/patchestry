name: Build KLEE Image

# KLEE's POSIX runtime depends on klee-uclibc, which supports x86/x86_64 only.
# The image is therefore amd64-only; the CI `llvm-build-and-test` job gates
# the KLEE test step off on arm64 runners. If klee-uclibc ever gains aarch64
# support (or we migrate to a different runtime), add an arm64 matrix here.

on:
  workflow_dispatch:
    inputs:
      llvm-version:
        description: 'LLVM version for the base image'
        required: false
        default: '22'
      image-version:
        description: 'Ubuntu version for the base image'
        required: false
        default: '22.04'
      klee-branch:
        description: 'KLEE branch to clone (override when building against a different LLVM)'
        required: false
        default: 'llvm20'
      klee-ref:
        description: 'KLEE git ref (commit SHA, branch, or tag) to check out'
        required: false
        default: '4006851f09af391a368578fd4644d236e36d77b7'
      no-cache:
        description: 'Build without Docker cache'
        required: false
        type: boolean
        default: false

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      packages: write
      contents: read

    env:
      LLVM_VER: ${{ inputs.llvm-version || '22' }}
      IMAGE_VER: ${{ inputs.image-version || '22.04' }}
      KLEE_BRANCH: ${{ inputs.klee-branch || 'llvm20' }}
      KLEE_REF: ${{ inputs.klee-ref || '4006851f09af391a368578fd4644d236e36d77b7' }}
      NO_CACHE: ${{ inputs.no-cache || 'false' }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af
          df -h

      - name: Clone the Patchestry repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set derived image names
        run: |
          echo "IMAGE_NAME=ghcr.io/lifting-bits/patchestry-klee-ubuntu-${IMAGE_VER}-llvm-${LLVM_VER}:latest" >> "$GITHUB_ENV"
          echo "BASE_IMAGE=ghcr.io/lifting-bits/patchestry-ubuntu-${IMAGE_VER}-llvm-${LLVM_VER}-dev:latest" >> "$GITHUB_ENV"

      - name: Pull base image
        run: docker pull "${BASE_IMAGE}"

      - name: Build KLEE image
        working-directory: scripts/klee
        run: |
          CACHE_FLAG=""
          if [ "${NO_CACHE}" = "true" ]; then
            CACHE_FLAG="--no-cache"
          fi
          DOCKER_BUILDKIT=1 docker build \
            --platform linux/amd64 \
            ${CACHE_FLAG} \
            --build-arg IMAGE_VERSION="${IMAGE_VER}" \
            --build-arg LLVM_VERSION="${LLVM_VER}" \
            --build-arg KLEE_BRANCH="${KLEE_BRANCH}" \
            --build-arg KLEE_REF="${KLEE_REF}" \
            -t "${IMAGE_NAME}" \
            -f Dockerfile \
            .

      - name: Verify KLEE installation
        run: |
          docker run --rm --platform linux/amd64 --entrypoint klee "${IMAGE_NAME}" --version

      - name: Log in to registry
        if: github.event_name == 'workflow_dispatch'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        if: github.event_name == 'workflow_dispatch'
        run: docker push "${IMAGE_NAME}"

      - name: Print image details
        run: |
          echo "Image: ${IMAGE_NAME}"
          docker images "${IMAGE_NAME}" --format "Size: {{.Size}}"
