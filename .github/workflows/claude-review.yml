name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

# Cancel an in-progress run on the same PR if a newer @claude request arrives.
concurrency:
  group: ${{ github.event.comment.user.type == 'Bot' && github.run_id || format('{0}-{1}', github.workflow, github.event.issue.number || github.event.pull_request.number) }}
  cancel-in-progress: true

jobs:
  review:
    # Only run when:
    #   - the comment/review body contains @claude, AND
    #   - the author is a trusted repository participant, AND
    #   - the comment is on a pull request (issue_comment fires for plain
    #     issues too; pull_request_review_comment and pull_request_review are
    #     always on a PR).
    if: |
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
      ) ||
      (
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        (github.event_name == 'pull_request_review_comment' ||
         (github.event_name == 'issue_comment' && github.event.issue.pull_request != null))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anthropics/claude-code-action@e58dfa55559035499a4982426bb73605e8b5ad8e # v1.0.105
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Run the patchir-review skill (.claude/skills/patchir-review/SKILL.md)
            against this PR. The skill defines: in-scope file extensions
            (C/C++/Bash/Python), the scope-skip behavior, finding tiers
            (CRITICAL/BUG/WARNING/SIMPLIFY), inline-comment output format,
            and the final verdict. Follow it exactly. Substitute REPO and
            PR NUMBER above wherever the skill says <REPO> or <PR>. Do not
            invent additional rules and do not print review text as chat
            output — every finding goes through the inline-comment MCP tool.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Grep,Glob,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(gh api:*),Bash(git log:*),Bash(git show:*),Bash(git grep:*)"