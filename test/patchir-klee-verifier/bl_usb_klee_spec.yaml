# KLEE verification spec for bl_usb__send_message
apiVersion: patchestry.io/v1

metadata:
  name: "bl-usb-klee-verification"
  description: "E2E: decomp -> transform (static contract) -> cir2llvm -> klee-verifier"
  version: "1.0.0"
  author: "Security Team"
  created: "2026-04-06"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32"

libraries:
  - "bl_usb_klee_patches.yaml"

execution_order:
  - "meta_contracts::bl_usb_contract"

meta_contracts:
  - name: "bl_usb_contract"
    description: "Static contract on usbd_ep_write_packet within bl_usb__send_message"

    contract_actions:
      - id: "BL-USB-KLEE-001"
        description: "Attach nonnull + range contract to usbd_ep_write_packet call"

        match:
          - name: "usbd_ep_write_packet"
            kind: "function"
            function_context:
              - name: "bl_usb__send_message"

        action:
          - mode: "apply_before"
            contract_id: "bl_usb_send_message_static_contract"
