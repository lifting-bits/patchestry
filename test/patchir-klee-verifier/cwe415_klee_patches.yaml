apiVersion: patchestry.io/v1
metadata:
  name: cwe415-klee-patches
  description: CWE-415 patches with static contract for KLEE verification
  version: 1.0.0
  author: Security Team
  created: '2026-03-26'
  kind: PatchLibrary
patch_definitions:
- name: cwe415_null_after_free
  description: Null pointer after free to prevent double free
  category: memory_safety
  function_name: patch::after::free
  code_file: ../patchir-transform/patches/patch_null_after_free.c
  parameters:
  - name: ptr_ref
    type: void*
    description: Reference to the pointer being freed (via is_reference)
contract_definitions:
- name: cwe415_static_contract
  description: 'Static contract: context arg must be non-null'
  category: memory_safety
  preconditions:
  - id: ctx_nonnull
    pred:
      kind: nonnull
      target: arg0
