# KLEE verification spec for CWE-415 double free
apiVersion: patchestry.io/v1

metadata:
  name: "cwe415-klee-verification"
  description: "E2E test: decomp → transform (patch + static contract) → cir2llvm → klee-verifier"
  version: "1.0.0"
  author: "Security Team"
  created: "2026-03-26"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32"

libraries:
  - "cwe415_klee_patches.yaml"

execution_order:
  - "meta_patches::cwe415_patch"
  - "meta_contracts::cwe415_contract"

meta_patches:
  - name: "cwe415_patch"
    description: "Null pointer after free to prevent double free"

    patch_actions:
      - id: "CWE-415-KLEE-001"
        description: "Apply null-after-free guard"

        match:
          - name: "free"
            kind: "function"
            function_context:
              - name: "process_command"

        action:
          - mode: "apply_after"
            patch_id: "cwe415_null_after_free"
            description: "Null the pointer after free via is_reference"
            arguments:
              - name: "ptr_ref"
                source: "operand"
                index: 0
                is_reference: true

meta_contracts:
  - name: "cwe415_contract"
    description: "Static contract: context pointer must be non-null"

    contract_actions:
      - id: "CWE-415-KLEE-002"
        description: "Attach nonnull precondition to handler_process"

        match:
          - name: "handler_process"
            kind: "function"
            function_context:
              - name: "process_command"

        action:
          - mode: "apply_before"
            contract_id: "cwe415_static_contract"
