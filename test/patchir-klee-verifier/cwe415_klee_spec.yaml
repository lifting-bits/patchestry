apiVersion: patchestry.io/v1
metadata:
  name: cwe415-klee-verification
  description: 'E2E test: decomp → transform (patch + static contract) → cir2llvm → klee-verifier'
  version: 1.0.0
  author: Security Team
  created: '2026-03-26'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- cwe415_klee_patches.yaml
patches:
- name: cwe415_patch
  id: CWE-415-KLEE-001
  description: Apply null-after-free guard
  match:
    name: free
    kind: function
    context:
    - process_command
  action:
    mode: apply_after
    patch: cwe415_null_after_free
    arguments:
    - name: ptr_ref
      source: operand
      index: 0
      is_reference: true
contracts:
- name: cwe415_contract
  id: CWE-415-KLEE-002
  description: Attach nonnull precondition to handler_process
  match:
    name: handler_process
    context:
    - process_command
  action:
    mode: apply_before
    contract: cwe415_static_contract
