apiVersion: patchestry.io/v1
metadata:
  name: cwe476-klee-verification
  description: 'E2E test: decomp → transform (patch + static contract) → cir2llvm → klee-verifier'
  version: 1.0.0
  author: Security Team
  created: '2026-03-26'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- cwe476_klee_patches.yaml
patches:
- name: cwe476_patch
  id: CWE-476-KLEE-001
  description: Null check before get_name
  match:
    name: get_name
    kind: function
    context:
    - poke_process
  action:
    mode: apply_before
    patch: cwe476_null_check
    arguments:
    - name: var_ptr
      source: operand
      index: 0
contracts:
- name: cwe476_contract
  id: CWE-476-KLEE-002
  description: Attach nonnull precondition to get_name
  match:
    name: get_name
    context:
    - poke_process
  action:
    mode: apply_before
    contract: cwe476_static_contract
