apiVersion: patchestry.io/v1
metadata: { name: "stmt-if-guarded", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "rewrite-stmt-if-guarded"
    id: "REWRITE-STMT-IF-GUARDED-001"
    match:
      name: "free"
      kind: "function"
      context: ["stmt_if_host"]
      captures:
        - { name: "P", operand: 0 }
    action:
      mode: "rewrite"
      stmt: |
        if ($P) free($P);
