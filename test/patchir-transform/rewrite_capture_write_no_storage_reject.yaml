apiVersion: patchestry.io/v1
metadata: { name: "capture-write-no-storage-reject", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "capture-write-no-storage-reject"
    id: "REWRITE-CAP-WRITE-NO-STORAGE-001"
    match:
      name: "cir.binop"
      kind: "operation"
      op_kind: "mul"
      context: ["nostorage_host"]
      captures:
        - { name: "R", result: 0 }
    action:
      mode: "rewrite"
      expr: "($R = 0) + (uint32_t)1"
