apiVersion: patchestry.io/v1
metadata:
  name: pb-varint-binop-captured
  kind: PatchSpec
target:
  binary: bloodview.bin
  arch: ARM:LE:32:Cortex
libraries:
- patches/replace_binop_patches.yaml
patches:
- name: capture_pb_binop
  id: PB-BINOP-001
  description: Capture binop operands in varint decoder
  match:
    name: cir.binop
    op_kind: add
    kind: operation
    context:
    - pb_decode_varint32_eof
    captures:
    - name: LHS
      operand: 0
    - name: RHS
      operand: 1
  action:
    mode: replace
    patch: checked_mul
    arguments:
    - name: LHS
      source: capture
    - name: RHS
      source: capture
