apiVersion: patchestry.io/v1
metadata:
  name: all-predicates-test
  description: Test all static contract predicate kinds on sprintf in bl_device__process_entry
  version: 1.0.0
  author: Security Team
  created: '2025-07-28'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/all_predicates_library.yaml
patches:
- name: sprintf_replace_patch
  id: ALL-PRED-PATCH-001
  description: Replace sprintf in bl_device__process_entry
  match:
    name: sprintf
    kind: function
    context:
    - bl_device__process_entry
  action:
    mode: replace
    patch: sprintf_replace_patch
    arguments:
    - name: dest
      source: operand
      index: '0'
    - name: dest_size
      source: constant
      value: '32'
    - name: format
      source: operand
      index: '1'
contracts:
- name: all_predicates_static_contract
  id: ALL-PRED-CONTRACT-001
  description: Static contract with nonnull, alignment, relation, range, and expr predicates
  match:
    name: patch__replace__sprintf
    context:
    - bl_device__process_entry
  action:
    mode: apply_before
    contract: all_predicates_static_contract
