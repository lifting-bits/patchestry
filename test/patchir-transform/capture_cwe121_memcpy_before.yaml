apiVersion: patchestry.io/v1
metadata:
  name: cwe121-memcpy-before-captured
  kind: PatchSpec
target:
  binary: firmware.bin
  arch: ARM:LE:32:Cortex
libraries:
- patches/capture_test_patches.yaml
patches:
- name: capture_memcpy_precheck
  id: CWE121-MEMCPY-001
  match:
    name: memcpy
    kind: function
    context:
    - _ZN5Debug7Command13EepromHandler5WriteEtPNS0_7ContextE
    captures:
    - name: DST
      operand: 0
    - name: LEN
      operand: 2
  action:
    mode: apply_before
    patch: ptr_log
    arguments:
    - name: DST
      source: capture
    - name: LEN
      source: capture
