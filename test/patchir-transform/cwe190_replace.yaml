apiVersion: patchestry.io/v1
metadata:
  name: cwe190-replace
  description: Fix integer overflow by replacing unchecked 16-bit multiply with overflow-checked version
  version: 1.0.0
  author: Security Team
  created: '2026-03-23'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/cwe190_patches.yaml
patches:
- name: cwe190_int_overflow_fix
  id: CWE-190-001
  description: Replace 16-bit multiply with overflow-checked version
  match:
    name: cir.binop
    op_kind: mul
    kind: operation
    context:
    - peek_process
  action:
    mode: replace
    patch: cwe190_checked_mul16
    arguments:
    - name: count
      source: operand
      index: 0
    - name: block_size
      source: operand
      index: 1
