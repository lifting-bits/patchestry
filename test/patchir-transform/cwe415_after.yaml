apiVersion: patchestry.io/v1
metadata:
  name: cwe415-after
  description: Fix double free by nulling pointer after first free via is_reference
  version: 1.0.0
  author: Security Team
  created: '2026-03-23'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/cwe415_patches.yaml
patches:
- name: cwe415_null_after_free
  id: CWE-415-001
  description: Apply null-after-free guard after first free() call
  match:
    name: free
    kind: function
    context:
    - process_command
  action:
    mode: apply_after
    patch: cwe415_null_after_free
    arguments:
    - name: ptr_ref
      source: operand
      index: 0
      is_reference: true
