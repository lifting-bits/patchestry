apiVersion: patchestry.io/v1
metadata:
  name: missing-library-test
  description: Spec that should fail because the referenced library file is absent
  version: 1.0.0
  author: Security Team
  created: '2026-03-13'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/does_not_exist.yaml
patches:
- name: missing_library_patch
  id: MISSING-LIB-001
  description: Should never execute
  match:
    name: spo2_lookup
    kind: function
  action:
    mode: apply_before
    patch: measurement_update_before_patch
    arguments:
    - name: function_argument
      source: variable
      symbol: var6
