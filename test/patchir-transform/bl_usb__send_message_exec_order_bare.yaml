# Same as bl_usb__send_message_before_patch.yaml but execution_order uses
# bare names (no "meta_patches::" / "meta_contracts::" prefix). The runtime
# must locate each name by searching both patches and contracts tables.
apiVersion: patchestry.io/v1

metadata:
  name: "usb-security-exec-order-bare"
  description: "Test bare-name execution_order entries"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32"

libraries:
  - "patches/usb_security_patches.yaml"

execution_order:
  - "usb_security_meta_patches"
  - "usb_security_meta_contracts"

meta_patches:
  - name: usb_security_meta_patches
    description: "Meta patches for USB security"
    patch_actions:
       - id: "USB-PATCH-001"
         description: "Patch to add USB security"
         match:
          - name: "usbd_ep_write_packet"
            kind: "function"
            function_context:
              - name: "bl_usb__send_message"
            argument_matches:
              - index: 0
                name: "usb_g"
                type: "struct _usbd_device*"
         action:
          - mode: "apply_before"
            patch_id: "usb_endpoint_write_validation_before"
            description: "Pre-validation security check"
            arguments:
              - name: "operand_0"
                source: "operand"
                index: "0"
              - name: "operand_2"
                source: "operand"
                index: "2"

meta_contracts:
  - name: usb_security_meta_contracts
    description: "Meta contracts for USB security"
    contract_actions:
      - id: "USB-CONTRACT-001"
        description: "Asserts message to send is less than maximum size"
        match:
        - name: "usbd_ep_write_packet"
          kind: "function"
          function_context:
            - name: "bl_usb__send_message"
          argument_matches:
            - index: 0
              name: "usb_g"
        action:
        - mode: "apply_before"
          contract_id: "usb_endpoint_write_validation_contract_before"
          arguments:
            - name: usb_device
              source: "argument"
              index: "0"
            - name: buffer
              source: "argument"
              index: "1"
