apiVersion: patchestry.io/v1
metadata:
  name: inline-chain-erase-uaf
  description: 'Regression: chained erase on an inline-queued patch call'
  version: 1.0.0
  author: Security Team
  created: '2026-04-22'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/measurement_update_patch.yaml
patches:
- name: uaf_p1_inline
  id: UAF-P1
  match:
    name: spo2_lookup
    kind: function
  action:
    mode: apply_before
    patch: measurement_update_before_patch
    arguments:
    - source: operand
      index: 0
    optimization:
    - inline-patches
- name: uaf_p2_erase_emitted
  id: UAF-P2
  match:
    name: patch__before__spo2_lookup
    kind: function
  action:
    mode: erase
