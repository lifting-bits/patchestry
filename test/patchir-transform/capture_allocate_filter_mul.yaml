apiVersion: patchestry.io/v1
metadata:
  name: allocate-filter-mul-captured
  kind: PatchSpec
target:
  binary: bloodview.bin
  arch: ARM:LE:32:v7
libraries:
- patches/replace_binop_patches.yaml
patches:
- name: capture_mul_filter
  id: ALLOC-MUL-001
  description: Overflow-check allocation size multiply
  match:
    name: cir.binop
    op_kind: mul
    kind: operation
    context:
    - data__allocate_filter
    captures:
    - name: SIZE_LHS
      operand: 0
    - name: SIZE_RHS
      operand: 1
  action:
    mode: replace
    patch: checked_mul
    arguments:
    - name: SIZE_LHS
      source: capture
    - name: SIZE_RHS
      source: capture
