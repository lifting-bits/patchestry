# Test patching specification
apiVersion: patchestry.io/v1

metadata:
  name: "bl-device-process-entry"
  description: "Fix usage of sprintf while processing device entries"
  version: "1.0.0"
  author: "Security Team"
  created: "2025-10-10"

target:
  binary: "bloodview"
  arch: "ARM:LE:32"

libraries:
  - "patches/bloodview_device_entry_patches.yaml"

patches:
  - name: "device_list_replace_sprintf_patch"
    id: "REPLACE-SPRINTF-001"
    description: "Replace sprintf with a bounds-aware version"
    match:
      name: "sprintf"
      kind: "function"
      context: ["bl_device__process_entry"]
    action:
      mode: "replace"
      patch: "device_list_replace_sprintf_patch"
      arguments:
        - name: "argument0"
          source: "operand"
          index: 0
        - name: "argument1"
          source: "constant"
          value: 32
        - name: "argument2"
          source: "operand"
          index: 1
        - name: "argument3"
          source: "operand"
          index: 2

  # Post-replacement bounds check, migrated from the old
  # device_list_replace_sprintf_contract runtime contract. Runs
  # apply_after against the patch-emitted @patch__replace__sprintf
  # call site.
  - name: "sprintf_bounds_check_after"
    id: "SPRINTF-BOUNDS-AFTER-001"
    description: "Assert sprintf return value stays within dest_size"
    match:
      name: "patch__replace__sprintf"
      kind: "function"
      context: ["bl_device__process_entry"]
    action:
      mode: "apply_after"
      patch: "sprintf_bounds_check_after"
      arguments:
        - name: "return_value"
          source: "return_value"
        - name: "dest_size"
          source: "constant"
          value: 32

contracts:
  - name: "sprintf_contract_static"
    id: "sprintf_contract_static"
    description: "Static contract for sprintf bounds"
    match:
      name: "patch__replace__sprintf"
      context: ["bl_device__process_entry"]
    action:
      mode: "apply_before"
      contract: "sprintf_contract_static"
