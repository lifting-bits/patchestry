apiVersion: patchestry.io/v1
metadata:
  name: capture-missing-source-reject
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/capture_test_patches.yaml
patches:
- name: should_not_parse
  id: CAP-MISSING-001
  match:
    name: cir.binop
    op_kind: mul
    kind: operation
    captures:
    - name: NOTHING
  action:
    mode: replace
    patch: ptr_only
    arguments:
    - name: NOTHING
      source: capture
