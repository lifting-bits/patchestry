apiVersion: patchestry.io/v1
metadata:
  name: op-kind-baseline-all
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/replace_binop_patches.yaml
patches:
- name: probe_any_binop
  id: BINOP-ALL
  match:
    name: cir.binop
    kind: operation
  action:
    mode: apply_after
    patch: void_probe_mul
    arguments:
    - source: operand
      index: 0
    - source: operand
      index: 1
