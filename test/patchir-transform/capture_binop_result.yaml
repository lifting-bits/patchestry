apiVersion: patchestry.io/v1
metadata:
  name: capture-binop-result
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/capture_result_library.yaml
patches:
- name: capture_mul_result
  id: CAP-RESULT-001
  match:
    name: cir.binop
    op_kind: mul
    kind: operation
    context:
    - int_mult_test
    captures:
    - name: R
      result: 0
  action:
    mode: apply_after
    patch: int_probe_after
    arguments:
    - name: R
      source: capture
