# Test contract specification for the QEMU serial firmware fixture
apiVersion: patchestry.io/v1

metadata:
  name: "qemu-serial-entry-contract"
  description: "Insert a visible runtime contract at qemu_target_contract entry"
  version: "1.0.0"
  author: "Codex"
  created: "2026-04-22"

target:
  binary: "qemu-serial.elf"
  arch: "ARM:LE:32"

libraries:
  - "patches/qemu_serial_patch_library.yaml"

meta_contracts:
  - name: "qemu_serial_entry_meta_contract"
    description: "Runtime contract inserted at qemu_target_contract entry"

    contract_actions:
      - id: "QEMU-SERIAL-ENTRY-CONTRACT-001"
        description: "Insert a visible entry contract"

        match:
          - name: "emit_base_prefix"
            kind: "function"
            function_context:
              - name: "qemu_target_contract"

        action:
          - mode: "apply_at_entrypoint"
            contract_id: "qemu_serial_entry_contract"
            description: "Emit a contract line at qemu_target_contract entrypoint"

            arguments: []
