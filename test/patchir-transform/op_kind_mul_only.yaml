# op_kind: "mul" — only cir.binop with Mul kind is replaced.
# The 4 other binops (add, sub, div, rem) stay intact.
apiVersion: patchestry.io/v1

metadata:
  name: "op-kind-mul-only"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32"

libraries:
  - "patches/replace_binop_patches.yaml"

patches:
  - name: "replace_mul_only"
    id: "BINOP-MUL"
    match:
      name: "cir.binop"
      kind: "operation"
      op_kind: "mul"
    mode: "replace"
    patch: "checked_mul"
    arguments:
      - source: "operand"
        index: 0
      - source: "operand"
        index: 1
