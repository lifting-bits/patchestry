# Negative test: a capture that sets both `operand:` and `result:` must
# be rejected at parse time. MappingTraits<patch::CaptureSpec> in
# include/patchestry/YAML/PatchSpec.hpp enforces the mutual exclusion;
# this fixture exists so the enforcement can't regress silently.
apiVersion: patchestry.io/v1

metadata:
  name: "capture-mutual-exclusion-reject"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32"

libraries:
  - "patches/capture_test_patches.yaml"

patches:
  - name: "should_not_parse"
    id: "CAP-MUTEX-001"
    match:
      name: "cir.binop"
      kind: "operation"
      captures:
        - name: "BAD"
          operand: 0   # mutually exclusive with
          result: 0    # — these cannot both be set.
    action:
      mode: "replace"
      patch: "ptr_only"
      arguments:
        - source: "capture"
          name: "BAD"
