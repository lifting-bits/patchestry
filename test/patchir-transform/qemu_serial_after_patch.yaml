# Test patching specification for the QEMU serial firmware fixture
apiVersion: patchestry.io/v1

metadata:
  name: "qemu-serial-after-patch"
  description: "Insert behavior after qemu_target_after calls emit_base_prefix"
  version: "1.0.0"
  author: "Codex"
  created: "2026-04-22"

target:
  binary: "qemu-serial.elf"
  arch: "ARM:LE:32"

libraries:
  - "patches/qemu_serial_patch_library.yaml"

meta_patches:
  - name: "qemu_serial_after_meta_patch"
    description: "Runtime after patch for qemu_target_after"

    patch_actions:
      - id: "QEMU-SERIAL-AFTER-001"
        description: "Insert output after emit_base_prefix in qemu_target_after"

        match:
          - name: "emit_base_prefix"
            kind: "function"
            function_context:
              - name: "qemu_target_after"

        action:
          - mode: "apply_after"
            patch_id: "qemu_serial_after_patch"
            description: "Emit a visible after line"

            arguments: []
