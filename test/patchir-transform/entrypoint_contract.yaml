# Test patching specification — APPLY_AT_ENTRYPOINT contract mode
apiVersion: patchestry.io/v1

metadata:
  name: "entrypoint-contract-test"
  description: "Test APPLY_AT_ENTRYPOINT contract mode on bl_usb__send_message"
  version: "1.0.0"
  author: "Security Team"
  created: "2025-07-28"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32:Cortex"

libraries:
  # these references are in relation to the location of this file
  - "patches/entrypoint_contract_library.yaml"

# The runtime-contract dispatch that used to live here (entrypoint_meta_contract)
# was equivalent to an apply_at_entrypoint patch — see entrypoint_patch.yaml
# for the replacement test.  This file now exercises only the static contract
# attachment onto the patch-emitted entrypoint call.
meta_contracts:
  - name: entrypoint_meta_contract_static
    description: "Static contract encoding formal preconditions on the entrypoint patch call"

    contract_actions:
      - id: "ENTRY-CONTRACT-002"
        description: "Attach nonnull precondition to the entrypoint patch call for formal verification"

        match:
          - name: "patch__entrypoint__message_entry_check"
            kind: "function"
            function_context:
              - name: "bl_usb__send_message"

        action:
          - mode: "apply_before"
            contract_id: "message_entry_check_contract_static"
            description: "Static nonnull precondition on message pointer"
