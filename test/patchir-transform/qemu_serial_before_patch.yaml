# Test patching specification for the QEMU serial firmware fixture
apiVersion: patchestry.io/v1

metadata:
  name: "qemu-serial-before-patch"
  description: "Insert behavior before qemu_target_before calls emit_base_prefix"
  version: "1.0.0"
  author: "Codex"
  created: "2026-04-22"

target:
  binary: "qemu-serial.elf"
  arch: "ARM:LE:32"

libraries:
  - "patches/qemu_serial_patch_library.yaml"

meta_patches:
  - name: "qemu_serial_before_meta_patch"
    description: "Runtime before patch for qemu_target_before"

    patch_actions:
      - id: "QEMU-SERIAL-BEFORE-001"
        description: "Insert output before emit_base_prefix in qemu_target_before"

        match:
          - name: "emit_base_prefix"
            kind: "function"
            function_context:
              - name: "qemu_target_before"

        action:
          - mode: "apply_before"
            patch_id: "qemu_serial_before_patch"
            description: "Emit a visible before line"

            arguments: []
