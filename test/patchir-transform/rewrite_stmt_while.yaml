apiVersion: patchestry.io/v1
metadata: { name: "stmt-while", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "rewrite-stmt-while"
    id: "REWRITE-STMT-WHILE-001"
    match:
      name: "start_loop"
      kind: "function"
      context: ["stmt_while_host"]
      captures:
        - { name: "N", operand: 0 }
    action:
      mode: "rewrite"
      stmt: |
        uint32_t i = 0;
        while (i < $N) {
          tick();
          i = i + 1;
        }
