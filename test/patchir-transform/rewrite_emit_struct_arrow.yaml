apiVersion: patchestry.io/v1
metadata: { name: "struct-arrow", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "rewrite-struct-arrow"
    id: "REWRITE-STRUCT-ARROW-001"
    match:
      name: "accessor_ptr"
      kind: "function"
      context: ["rewrite_struct_arrow_host"]
      captures:
        - { name: "P", operand: 0 }
    action:
      mode: "rewrite"
      expr: "$P->x"
