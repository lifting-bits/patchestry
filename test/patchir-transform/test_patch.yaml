apiVersion: patchestry.io/v1
metadata:
  name: malformed-schema-test
  description: Deliberately broken spec; should fail YAML validation
  version: 1.0.0
  author: Security Team
  created: '2026-04-21'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/usb_security_patches.yaml
patches:
- description: entry-level 'name:' is absent → missing required key
  match:
    name: usbd_ep_write_packet
    kind: function
  action:
    mode: apply_before
    patch: usb_endpoint_write_validation_before
- name: match_missing_name
  description: 'match: block has neither ''name:'' nor ''names:'' → must include'
  match:
    kind: function
  action:
    mode: apply_before
    patch: usb_endpoint_write_validation_before
