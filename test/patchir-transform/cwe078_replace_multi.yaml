apiVersion: patchestry.io/v1
metadata:
  name: cwe078-multi-match
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/cwe078_patches.yaml
patches:
- name: sanitize_calls
  id: CWE-078-MULTI
  match:
    names:
    - system
    - sprintf
    kind: function
    context:
    - create_port
  action:
    mode: replace
    patch: cwe078_sanitized_system
    arguments:
    - source: operand
      index: 0
    - source: constant
      value: 512
