apiVersion: patchestry.io/v1
metadata:
  name: cwe121_complex_patches
  description: CWE-121 complex stack overflow patches (loop-based strcat)
  version: 1.0.0
  author: Security Team
  created: '2026-03-17'
  kind: PatchLibrary
patch_definitions:
- name: cwe121_bounded_strcat
  description: Replace unbounded strcat with strncat respecting buffer capacity
  category: memory_safety
  function_name: patch::replace::strcat
  code_file: patches/patch_strcat.c
  parameters:
  - name: dest
    type: char*
    description: Destination buffer
  - name: src
    type: const char*
    description: Source string to append
  - name: buf_size
    type: size_t
    description: Total buffer capacity
