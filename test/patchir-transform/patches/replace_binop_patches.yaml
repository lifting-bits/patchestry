apiVersion: patchestry.io/v1

metadata:
  name: "replace_binop_patches"
  version: "1.0.0"
  description: "Patches for replacing binary operations"
  author: "Security Team"
  created: "2026-03-23"

patches:
  - name: "checked_mul"
    description: "Replace unchecked multiply with overflow-checked version"
    category: "integer_safety"
    code_file: "patches/patch_checked_mul.c"
    function_name: "patch::replace::int_mul"
    parameters:
      - name: "a"
        type: "unsigned int"
        description: "Left operand"
      - name: "b"
        type: "unsigned int"
        description: "Right operand"

  # Single-return variant used by inline_patches_replace_binop.yaml to
  # exercise replaceOperationWithPatch + inline-patches
  # (PatchOperationImpl:379). `checked_mul` has an early return and is
  # blocked by Bug F; this one has no control flow.
  - name: "passthrough_mul"
    description: "Single-return multiply replacement suitable for inlining"
    category: "integer_safety"
    code_file: "patches/patch_simple_mul.c"
    function_name: "patch::replace::passthrough_mul"
    parameters:
      - name: "a"
        type: "unsigned int"
      - name: "b"
        type: "unsigned int"

  # Void probe used by replace_binop_void_reject.json to exercise the
  # arity pre-check in `replaceOperationWithPatch`: replacing a
  # value-producing op with a void patch must be rejected up front, not
  # half-applied.
  - name: "void_probe_mul"
    description: "Void patch (regression witness for arity pre-check)"
    category: "integer_safety"
    code_file: "patches/patch_void_probe_mul.c"
    function_name: "patch::probe::void_mul"
    parameters:
      - name: "a"
        type: "unsigned int"
      - name: "b"
        type: "unsigned int"
