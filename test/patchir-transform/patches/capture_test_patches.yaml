apiVersion: patchestry.io/v1
metadata:
  name: capture_test_patches
  description: Test patches for capture feature verification
  version: 1.0.0
  author: Security Team
  created: '2026-04-20'
  kind: PatchLibrary
patch_definitions:
- name: ptr_log
  description: Log a pointer and size, used by capture tests
  category: test
  function_name: patch::before::ptr_log
  code_file: patches/patch_ptr_logger.c
  parameters:
  - name: ptr
    type: void*
    description: Pointer argument
  - name: n
    type: unsigned long
    description: Size argument
- name: ptr_only
  description: Single-pointer pre-call hook for tests
  category: test
  function_name: patch::before::ptr_only
  code_file: patches/patch_ptr_logger.c
  parameters:
  - name: ptr
    type: void*
    description: Pointer argument
- name: replace_load_u32
  description: Replace a cir.load with a call returning u32
  category: test
  function_name: patch::replace::load_u32
  code_file: patches/patch_replace_load.c
  parameters:
  - name: ptr
    type: unsigned int*
    description: Pointer being loaded
