apiVersion: patchestry.io/v1
metadata: { name: "mask", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "rewrite-mask"
    id: "REWRITE-MASK-001"
    match:
      name: "cir.binop"
      kind: "operation"
      op_kind: "mul"
      context: ["rewrite_host"]
      captures:
        - { name: "R", result: 0 }
    action:
      mode: "rewrite"
      expr: "$R & 0xFF"
