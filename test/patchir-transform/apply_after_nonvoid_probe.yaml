# Regression: apply_after (and apply_before) must honor the patch
# function's declared return type. Previously hardcoded `mlir::Type()`
# (void), which silently worked for every void observational probe in
# the existing suite but would reject any non-void patch at MLIR
# verification with `incorrect number of results for callee`.
#
# Uses patch__replace__passthrough_mul (u32(u32, u32) -> u32). The
# apply_after call discards the returned value; what we assert is
# simply that the emitted cir.call has the correct declared result
# type and passes the verifier.
apiVersion: patchestry.io/v1

metadata:
  name: "apply-after-nonvoid"
  description: "apply_after with a non-void probe must verify cleanly"
  version: "1.0.0"
  author: "Test Suite"
  created: "2026-04-23"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32"

libraries:
  - "patches/replace_binop_patches.yaml"

patches:
  - name: "apply_after_nonvoid"
    id: "APPLY-AFTER-NONVOID-001"
    description: "apply_after a non-void probe after the multiply"
    match:
      name: "cir.binop"
      op_kind: "mul"
      kind: "operation"
      context: ["compute_alloc_size"]
    action:
      mode: "apply_after"
      patch: "passthrough_mul"
      arguments:
        - source: "operand"
          index: 0
        - source: "operand"
          index: 1
