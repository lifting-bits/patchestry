apiVersion: patchestry.io/v1
metadata: { name: "struct-dot-ternary", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "rewrite-struct-dot-ternary"
    id: "REWRITE-STRUCT-DOT-TERNARY-001"
    match:
      name: "accessor_cond_val"
      kind: "function"
      context: ["rewrite_struct_dot_ternary_host"]
      captures:
        - { name: "C", operand: 0 }
        - { name: "P", operand: 1 }
    action:
      mode: "rewrite"
      expr: "$C ? $P.x : $P.y"
