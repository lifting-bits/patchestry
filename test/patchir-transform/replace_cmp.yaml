apiVersion: patchestry.io/v1
metadata:
  name: replace-cmp
  description: Replace off-by-one bounds comparison with correct check
  version: 1.0.0
  author: Security Team
  created: '2026-03-23'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/replace_cmp_patches.yaml
patches:
- name: cmp_bounds_fix
  id: CMP-REPLACE-001
  description: Replace >= comparison with corrected bounds check
  match:
    name: cir.cmp
    op_kind: le
    kind: operation
    context:
    - circular_buffer_put
  action:
    mode: replace
    patch: fixed_bounds_check
    arguments:
    - name: index
      source: operand
      index: 0
    - name: size
      source: operand
      index: 1
