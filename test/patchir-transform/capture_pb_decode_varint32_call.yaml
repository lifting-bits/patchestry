apiVersion: patchestry.io/v1
metadata:
  name: pb-varint-call-captured
  kind: PatchSpec
target:
  binary: bloodview.bin
  arch: ARM:LE:32:Cortex
libraries:
- patches/replace_binop_patches.yaml
patches:
- name: capture_pb_readbyte
  id: PB-CALL-001
  description: Capture pb_readbyte args
  match:
    name: pb_readbyte
    kind: function
    context:
    - pb_decode_varint32_eof
    captures:
    - name: BUF
      operand: 0
    - name: OFFSET
      operand: 1
  action:
    mode: replace
    patch: checked_mul
    arguments:
    - name: BUF
      source: capture
    - name: OFFSET
      source: capture
