apiVersion: patchestry.io/v1
metadata:
  name: erase-spi-send
  description: Remove bl_spi_send() call from bl_led_loop
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
patches:
- name: strip_spi_send
  id: ERASE-SPI-001
  match:
    name: bl_spi_send
    kind: function
    context:
    - bl_led_loop
  action:
    mode: erase
