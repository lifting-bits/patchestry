apiVersion: patchestry.io/v1
metadata: { name: "stmt-free-and-null", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "rewrite-stmt-free-and-null"
    id: "REWRITE-STMT-FREE-AND-NULL-001"
    match:
      name: "free"
      kind: "function"
      context: ["stmt_free_host"]
      captures:
        - { name: "P", operand: 0 }
    action:
      mode: "rewrite"
      stmt: |
        free($P); $P = 0;
