apiVersion: patchestry.io/v1
metadata:
  name: unsupported-argument-source-test
  description: Spec that should fail because argument source is unsupported
  version: 1.0.0
  author: Security Team
  created: '2026-03-13'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/measurement_update_patch.yaml
patches:
- name: unsupported_argument_source_patch
  id: UNSUPPORTED-SOURCE-001
  description: Should fail during parsing
  match:
    name: spo2_lookup
    kind: function
  action:
    mode: apply_before
    patch: measurement_update_before_patch
    arguments:
    - name: function_argument
      source: mystery_source
      symbol: var6
