apiVersion: patchestry.io/v1
metadata: { name: "bswap", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "rewrite-byte-swap"
    id: "REWRITE-BSWAP-001"
    match:
      name: "cir.binop"
      kind: "operation"
      op_kind: "mul"
      context: ["rewrite_host"]
      captures:
        - { name: "R", result: 0 }
    action:
      mode: "rewrite"
      expr: "(uint32_t)(((uint32_t)$R << 24) | (((uint32_t)$R << 8) & 0x00FF0000) | (((uint32_t)$R >> 8) & 0x0000FF00) | ((uint32_t)$R >> 24))"
