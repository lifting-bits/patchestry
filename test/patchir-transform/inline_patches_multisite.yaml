apiVersion: patchestry.io/v1
metadata:
  name: inline-patches-multisite
  description: Inline the same apply_before patch at every __aeabi_fdiv call
  version: 1.0.0
  author: Security Team
  created: '2026-04-22'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/measurement_update_patch.yaml
patches:
- name: inline_multisite_fdiv
  id: INLINE-MULTISITE-001
  description: Apply + inline patch at every __aeabi_fdiv call site
  match:
    name: __aeabi_fdiv
    kind: function
  action:
    mode: apply_before
    patch: measurement_update_before_patch
    arguments:
    - name: function_argument
      source: operand
      index: 0
    optimization:
    - inline-patches
