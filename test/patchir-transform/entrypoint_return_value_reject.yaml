# Negative test: `mode: apply_at_entrypoint` combined with
# `source: return_value` must be rejected at spec load. The call result
# is defined only at the matched call site and cannot be referenced
# from the enclosing function's entry block. Previously passed
# spec-load validation and failed later with a verifier arity error.
apiVersion: patchestry.io/v1

metadata:
  name: "entrypoint-return-value-reject"
  description: "apply_at_entrypoint + source:return_value must be rejected"
  version: "1.0.0"
  author: "Test Suite"
  created: "2026-04-23"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32:Cortex"

libraries:
  - "patches/entrypoint_patch_library.yaml"

patches:
  - name: "bad_entry_retval"
    id: "ENTRY-RETVAL-REJECT-001"
    description: "Invalid combo: entrypoint + return_value"
    match:
      name: "usbd_ep_write_packet"
      kind: "function"
      context: ["bl_usb__send_message"]
    action:
      mode: "apply_at_entrypoint"
      patch: "message_entry_check_patch"
      arguments:
        - source: "return_value"
