apiVersion: patchestry.io/v1
metadata:
  name: entrypoint-return-value-reject
  description: apply_at_entrypoint + source:return_value must be rejected
  version: 1.0.0
  author: Test Suite
  created: '2026-04-23'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32:Cortex
libraries:
- patches/entrypoint_patch_library.yaml
patches:
- name: bad_entry_retval
  id: ENTRY-RETVAL-REJECT-001
  description: 'Invalid combo: entrypoint + return_value'
  match:
    name: usbd_ep_write_packet
    kind: function
    context:
    - bl_usb__send_message
  action:
    mode: apply_at_entrypoint
    patch: message_entry_check_patch
    arguments:
    - source: return_value
