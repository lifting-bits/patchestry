apiVersion: patchestry.io/v1
metadata: { name: "deref", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "rewrite-deref"
    id: "REWRITE-DEREF-001"
    match:
      name: "sink_deref"
      kind: "function"
      context: ["rewrite_deref_host"]
      captures:
        - { name: "p", operand: 0 }
    action:
      mode: "rewrite"
      expr: "*$p"
