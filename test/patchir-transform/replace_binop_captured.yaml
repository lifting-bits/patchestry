# Test: named captures on a cir.binop match.
# Equivalent to replace_binop.yaml but uses `captures:` + `source: "capture"`
# instead of index-based operand references. Output must be byte-identical.
apiVersion: patchestry.io/v1

metadata:
  name: "binop-captured"
  description: "Replace multiply using captured operands"
  version: "1.0.0"
  author: "Security Team"
  created: "2026-04-20"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32"

libraries:
  - "patches/replace_binop_patches.yaml"

patches:
  - name: "binop_mul_fix_captured"
    id: "BINOP-CAPTURED-001"
    description: "Replace multiply via captured $A and $B"
    match:
      name: "cir.binop"
      kind: "operation"
      context: ["compute_alloc_size"]
      captures:
        - name: "A"
          operand: 0
        - name: "B"
          operand: 1
    mode: "replace"
    patch: "checked_mul"
    arguments:
      - source: "capture"
        name: "A"
      - source: "capture"
        name: "B"
