apiVersion: patchestry.io/v1
metadata:
  name: measurement-update-before-operation
  description: Patch measurement update before operation
  version: 1.0.0
  author: Security Team
  created: '2025-07-28'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/measurement_update_patch.yaml
patches:
- name: measurement_update_before_operation
  id: MEASUREMENT-UPDATE-BEFORE-OPERATION-001
  description: Patch measurement update before operation
  match:
    name: cir.call
    kind: operation
    context:
    - /.*measurement.*/
    - /.*update.*/
    operand_matches:
    - index: 0
      type: float
    symbol_matches:
    - name: spo2_lookup
  action:
    mode: apply_before
    patch: measurement_update_before_operation
    arguments:
    - name: function_argument
      source: operand
      index: 0
