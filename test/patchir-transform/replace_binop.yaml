apiVersion: patchestry.io/v1

metadata:
  name: "replace-binop"
  description: "Replace unchecked integer multiply with overflow-checked version"
  version: "1.0.0"
  author: "Security Team"
  created: "2026-03-23"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32"

libraries:
  - "patches/replace_binop_patches.yaml"

meta_patches:
  - name: "binop_mul_fix"
    description: "Replace unchecked INT_MULT in compute_alloc_size"

    patch_actions:
      - id: "BINOP-REPLACE-001"
        description: "Replace multiply with overflow-checked version"

        match:
          - name: "cir.binop"
            op_kind: "mul"
            kind: "operation"
            function_context:
              - name: "compute_alloc_size"

        action:
          - mode: "rewrite"
            patch_id: "checked_mul"
            description: "Replace multiply with checked version"
            arguments:
              - name: "a"
                source: "operand"
                index: 0
              - name: "b"
                source: "operand"
                index: 1
