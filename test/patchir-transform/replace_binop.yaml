apiVersion: patchestry.io/v1
metadata:
  name: replace-binop
  description: Replace unchecked integer multiply with overflow-checked version
  version: 1.0.0
  author: Security Team
  created: '2026-03-23'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/replace_binop_patches.yaml
patches:
- name: binop_mul_fix
  id: BINOP-REPLACE-001
  description: Replace multiply with overflow-checked version
  match:
    name: cir.binop
    op_kind: mul
    kind: operation
    context:
    - compute_alloc_size
  action:
    mode: replace
    patch: checked_mul
    arguments:
    - name: a
      source: operand
      index: 0
    - name: b
      source: operand
      index: 1
