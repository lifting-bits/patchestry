apiVersion: patchestry.io/v1
metadata:
  name: replace-binop-void-reject
  description: 'Regression: replace cir.binop(mul) with a void patch must be rejected'
  version: 1.0.0
  author: Security Team
  created: '2026-04-23'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/replace_binop_patches.yaml
patches:
- name: binop_mul_void_reject
  id: BINOP-REPLACE-VOID-REJECT-001
  description: Replace multiply with a void probe (must be rejected)
  match:
    name: cir.binop
    op_kind: mul
    kind: operation
    context:
    - compute_alloc_size
  action:
    mode: replace
    patch: void_probe_mul
    arguments:
    - name: a
      source: operand
      index: 0
    - name: b
      source: operand
      index: 1
