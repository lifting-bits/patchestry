apiVersion: patchestry.io/v1
metadata:
  name: binop-capture-reuse
  description: Capture A bound once, reused twice in the arguments list
  version: 1.0.0
  author: Test Suite
  created: '2026-04-23'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/replace_binop_patches.yaml
patches:
- name: binop_capture_reuse
  id: BINOP-CAPTURE-REUSE-001
  description: Pass capture A to both patch parameters
  match:
    name: cir.binop
    op_kind: mul
    kind: operation
    context:
    - compute_alloc_size
    captures:
    - name: A
      operand: 0
  action:
    mode: replace
    patch: passthrough_mul
    arguments:
    - name: A
      source: capture
    - name: A
      source: capture
