# Negative test: `mode: apply_at_entrypoint` combined with
# `source: capture` must be rejected at spec load. Captures are bound
# at the matched call site and do not dominate the enclosing function's
# entry block; emitting a patch call there from a capture would
# violate SSA dominance. Before the cross-field gate in PatchSpec.hpp,
# this spec passed `patchir-yaml-parser --validate` and only failed
# later with an obscure `'cir.call' op incorrect number of operands`
# verifier error after the runtime dispatch dropped the capture arg.
apiVersion: patchestry.io/v1

metadata:
  name: "entrypoint-capture-reject"
  description: "apply_at_entrypoint + source:capture must be rejected"
  version: "1.0.0"
  author: "Test Suite"
  created: "2026-04-23"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32:Cortex"

libraries:
  - "patches/entrypoint_patch_library.yaml"

patches:
  - name: "bad_entry_capture"
    id: "ENTRY-CAPTURE-REJECT-001"
    description: "Invalid combo: entrypoint + capture"
    match:
      name: "usbd_ep_write_packet"
      kind: "function"
      context: ["bl_usb__send_message"]
      captures:
        - name: "M"
          operand: 1
    action:
      mode: "apply_at_entrypoint"
      patch: "message_entry_check_patch"
      arguments:
        - source: "capture"
          name: "M"
