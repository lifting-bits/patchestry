apiVersion: patchestry.io/v1
metadata:
  name: bad-patch-ref-test
  description: Spec with a patch_id that is not defined in any loaded library
  version: 1.0.0
  author: Security Team
  created: '2025-07-28'
  kind: PatchSpec
target:
  binary: test_binary.bin
  arch: ARM:LE:32
libraries:
- patches/measurement_update_patch.yaml
patches:
- name: bad_ref_patch
  id: BAD-REF-001
  description: This action references an undefined patch
  match:
    name: spo2_lookup
    kind: function
  action:
    mode: apply_before
    patch: patch_that_does_not_exist_anywhere
    arguments:
    - name: function_argument
      source: variable
      symbol: var6
