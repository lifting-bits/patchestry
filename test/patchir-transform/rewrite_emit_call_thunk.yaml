apiVersion: patchestry.io/v1
metadata: { name: "thunk", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "rewrite-call-thunk"
    id: "REWRITE-THUNK-001"
    match:
      name: "foo"
      kind: "function"
      context: ["rewrite_call_host"]
      captures:
        - { name: "A", operand: 0 }
        - { name: "B", operand: 1 }
    action:
      mode: "rewrite"
      expr: "foo_v2($A, $B, 0)"
