apiVersion: patchestry.io/v1
metadata:
  name: op-entrypoint-reject
  kind: PatchSpec
target:
  binary: x.bin
  arch: ARM:LE:32
libraries:
- patches/measurement_update_patch.yaml
patches:
- name: bogus_op_entrypoint
  id: OP-ENTRY-REJECT-001
  match:
    name: cir.call
    kind: operation
    context:
    - measurement_update
  action:
    mode: apply_at_entrypoint
    patch: measurement_update_before_patch
    arguments:
    - source: operand
      index: 0
