apiVersion: patchestry.io/v1
metadata:
  name: expand-cast-replace
  kind: PatchSpec
target:
  binary: stm32_firmware.bin
  arch: ARM:LE:32:Cortex
libraries:
- patches/capture_test_patches.yaml
patches:
- name: replace_cast
  id: EXPAND-CAST-001
  match:
    name: cir.cast
    kind: operation
    context:
    - rcc_osc_off
    captures:
    - name: IN
      operand: 0
  action:
    mode: replace
    patch: replace_load_u32
    arguments:
    - name: IN
      source: capture
