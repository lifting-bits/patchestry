# Rewrite a cir.cast operation by routing through a patch function.
# `replaceOperationWithPatch` accepts any op with results, including
# cir.cast — the fixture casts s32 -> u32 once in rcc_osc_off, and
# the patch substitutes that cast with a load.
apiVersion: patchestry.io/v1

metadata:
  name: "expand-cast-replace"

target:
  binary: "stm32_firmware.bin"
  arch: "ARM:LE:32:Cortex"

libraries:
  - "patches/capture_test_patches.yaml"

patches:
  - name: "replace_cast"
    id: "EXPAND-CAST-001"
    match:
      name: "cir.cast"
      kind: "operation"
      context: ["rcc_osc_off"]
      captures:
        - name: "IN"
          operand: 0
    action:
      mode: "rewrite"
      patch: "replace_load_u32"
      arguments:
        - source: "capture"
          name: "IN"
