# Positive companion to inline_patches_replace.yaml. Uses a single-return
# replacement patch (patch__replace__saturate_spo2) so the inliner
# doesn't hit Bug F. Exercises PatchOperationImpl.cpp:289
# (replaceCallWithPatch) plus the inline worklist path.
apiVersion: patchestry.io/v1

metadata:
  name: "inline-patches-replace-positive"
  description: "Replace + inline a single-return patch at spo2_lookup"
  version: "1.0.0"
  author: "Security Team"
  created: "2026-04-22"

libraries:
  - "patches/measurement_update_patch.yaml"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32"

patches:
  - name: "inline_replace_saturate"
    id: "INLINE-REPLACE-POS-001"
    description: "Replace + inline the saturate patch at spo2_lookup"
    match:
      name: "spo2_lookup"
      kind: "function"
    action:
      mode: "replace"
      patch: "measurement_update_saturate_patch"
      arguments:
        - name: "function_argument"
          source: "operand"
          index: 0
      optimization: ["inline-patches"]
