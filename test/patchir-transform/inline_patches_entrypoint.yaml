# Regression: `optimization: ["inline-patches"]` on an apply_at_entrypoint
# action. Exercises the inline worklist insertion at
# PatchOperationImpl.cpp:581 (applyPatchAtEntrypoint) — previously
# uncovered by CI. Reuses entrypoint_patch_library.yaml's
# `message_entry_check_patch` which has a single (void) return and is
# safe to inline.
apiVersion: patchestry.io/v1

metadata:
  name: "inline-patches-entrypoint"
  description: "Apply at entrypoint + inline the message-pointer null check"
  version: "1.0.0"
  author: "Security Team"
  created: "2026-04-22"

target:
  binary: "test_binary.bin"
  arch: "ARM:LE:32:Cortex"

libraries:
  - "patches/entrypoint_patch_library.yaml"

patches:
  - name: "inline_entrypoint_message_check"
    id: "INLINE-ENTRYPOINT-001"
    description: "Insert + inline the entry-point null-check patch"
    match:
      name: "usbd_ep_write_packet"
      kind: "function"
      context: ["bl_usb__send_message"]
    action:
      mode: "apply_at_entrypoint"
      patch: "message_entry_check_patch"
      arguments:
        - source: "variable"
          symbol: "msg"
      optimization: ["inline-patches"]
