apiVersion: patchestry.io/v1
metadata: { name: "struct-dot", version: "1.0.0" }
target: { binary: "x", arch: "ARM:LE:32" }
patches:
  - name: "rewrite-struct-dot"
    id: "REWRITE-STRUCT-DOT-001"
    match:
      name: "accessor_val"
      kind: "function"
      context: ["rewrite_struct_dot_host"]
      captures:
        - { name: "P", operand: 0 }
    action:
      mode: "rewrite"
      expr: "$P.y"
